<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台管理系统</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:#e2e8f0;
}

.header{
  padding:16px;
  background:#111827;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.logout{
  background:#ef4444;
  color:white;
}

.container{
  padding:20px;
}

.card{
  background:#111827;
  padding:14px;
  margin-bottom:12px;
  border-radius:12px;
  display:flex;
  gap:12px;
  align-items:flex-start;
}

.avatar{
  width:50px;
  height:50px;
  border-radius:50%;
}

.info{
  flex:1;
}

.username{
  font-weight:bold;
}

.small{
  font-size:13px;
  color:#94a3b8;
}
</style>
</head>

<body>

<div class="header">
  <h3>后台管理系统</h3>
  <button class="logout" onclick="logout()">退出登录</button>
</div>

<div class="container" id="list">
  正在加载...
</div>

<script>
const API = "/api";
const token = localStorage.getItem("token");
const user = localStorage.getItem("user");

// ================= 权限校验 =================
if(!token || user !== "admin"){
  location.href = "/";
}

// ================= 加载用户列表 =================
async function load(){

  const res = await fetch(API + "/admin/users",{
    headers:{Authorization:token}
  });

  const d = await res.json();

  if(!d.ok){
    document.body.innerHTML = "无权限或登录失效";
    return;
  }

  list.innerHTML = d.users.map(u => `
    <div class="card">
      
      <img class="avatar"
        src="${u.avatar || 'https://api.dicebear.com/7.x/identicon/svg?seed='+u.username}">

      <div class="info">
        <div class="username">${u.username}</div>

        <div class="small">简介：</div>
        <div>${u.bio || "无"}</div>

        <div class="small">留言：</div>
        <div>${u.msg || "无"}</div>
      </div>

    </div>
  `).join("");
}

load();

// ================= 退出 =================
function logout(){
  localStorage.clear();
  location.href = "/";
}
</script>

</body>
</html>
