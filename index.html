<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>留白3.0</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:#e2e8f0;
}

.hidden{display:none;}

/* 登录 */
#loginBox{
  width:300px;
  margin:100px auto;
  background:#111827;
  padding:20px;
  border-radius:10px;
}

input,button{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:none;
}

.primary{background:#3b82f6;color:#fff;cursor:pointer;}
.danger{background:#ef4444;color:#fff;cursor:pointer;}

/* 用户端 */
#userApp{
  text-align:center;
  padding:40px;
}

.avatar{
  width:80px;
  height:80px;
  border-radius:50%;
}

/* 后台 */
#adminApp{
  display:flex;
  height:100vh;
}

.sidebar{
  width:200px;
  background:#111827;
  padding:20px;
}

.main{
  flex:1;
  padding:20px;
  overflow:auto;
}

.table{
  width:100%;
  border-collapse:collapse;
}

.table th,.table td{
  padding:10px;
  border-bottom:1px solid #1f2937;
  font-size:13px;
}

.avatar-sm{
  width:30px;
  height:30px;
  border-radius:50%;
}

</style>
</head>
<body>

<!-- 登录 -->
<div id="loginBox">
  <h3>系统登录</h3>
  <input id="user" placeholder="用户名">
	<input id="pass" placeholder="密码">

	<button onclick="login()">登录</button>
	<button onclick="register()">注册</button>

	<p id="msg"></p>

	<script src="script.js"></script>
  <div id="msg"></div>
</div>

<!-- 用户端 -->
<div id="userApp" class="hidden">
  <img id="uAvatar" class="avatar">
  <h2 id="uName"></h2>
  <input type="file" id="avatarFile">

<button onclick="uploadAvatar()" style="
  width:100%;
  padding:10px;
  margin-top:8px;
  background:#22c55e;
  color:white;
  border:none;
  border-radius:8px;
">
上传头像
</button>
  <button class="danger" onclick="logout()">退出登录</button>
</div>

<!-- 管理后台 -->
<div id="adminApp" class="hidden">

  <div class="sidebar">
    <h3>后台</h3>
    <button onclick="loadUsers()">用户管理</button>
    <button class="danger" onclick="logout()">退出</button>
  </div>

  <div class="main">
    <h2>用户列表</h2>
    <table class="table">
      <thead>
        <tr>
          <th>头像</th>
          <th>用户名</th>
          <th>密码(哈希)</th>
        </tr>
      </thead>
      <tbody id="userTable"></tbody>
    </table>
  </div>

</div>

<script>
const API = "https://ceshi03.2750018830.workers.dev";

async function login(){

  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  const res = await fetch(API+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({user,pass})
  });

  const data = await res.json();

  if(!data.ok){
    document.getElementById("msg").innerText="登录失败";
    return;
  }

  localStorage.setItem("token",data.token);
  localStorage.setItem("user",data.user);

  route(data.user);
}

function route(user){

  document.getElementById("loginBox").classList.add("hidden");

  if(user === "admin"){
    document.getElementById("adminApp").classList.remove("hidden");
    loadUsers();
  }else{
    document.getElementById("userApp").classList.remove("hidden");
    document.getElementById("uName").innerText = user;
    document.getElementById("uAvatar").src = "https://api.dicebear.com/7.x/identicon/svg?seed="+user;
  }
}

async function loadUsers(){

  const res = await fetch(API+"/admin/users",{
    headers:{"Authorization":localStorage.getItem("token")}
  });

  const data = await res.json();

  if(!data.ok) return;

  document.getElementById("userTable").innerHTML = data.users.map(u=>`
    <tr>
      <td><img class='avatar-sm' src='${u.avatar || "https://api.dicebear.com/7.x/identicon/svg?seed="+u.username}'></td>
      <td>${u.username}</td>
      <td>${u.password}</td>
    </tr>
  `).join("");
}

async function register(){

  const user = document.getElementById("user").value.trim();
  const pass = document.getElementById("pass").value.trim();

  if(!user || !pass){
    document.getElementById("msg").innerText = "用户名或密码不能为空";
    return;
  }

  try{
    const res = await fetch(API + "/register", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ user, pass })
    });

    const data = await res.json();

    if(data.ok){
      document.getElementById("msg").innerText = "注册成功，可以登录";
    }else{
      document.getElementById("msg").innerText = data.msg || "注册失败";
    }

  }catch(e){
    console.log(e);
    document.getElementById("msg").innerText = "网络错误";
  }
}

function logout(){
  localStorage.clear();
  location.reload();
}

// 自动登录
window.onload = ()=>{
  const user = localStorage.getItem("user");
  const token = localStorage.getItem("token");

  if(user && token){
    route(user);
  }
};

</script>

</body>
</html>
