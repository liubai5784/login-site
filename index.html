<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>这是一个网站</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:#e2e8f0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:320px;
  background:#111827;
  padding:20px;
  border-radius:12px;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:none;
  background:#0b1220;
  color:white;
}

button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.login{background:#3b82f6;color:white;}
.register{background:#334155;color:white;}

#msg{
  text-align:center;
  margin-top:10px;
  font-size:13px;
  color:#93c5fd;
}
</style>
</head>

<body>

<div class="box">

  <h3 style="text-align:center;">想用的话你得先登录</h3>

  <input id="u" placeholder="君の名字">
  <input id="p" type="password" placeholder="密码">

  <button class="login" onclick="login()">登录</button>
  <button class="register" onclick="register()">注册</button>

  <div id="msg"></div>

</div>

<script>
const API = "/api"; // ⚠️ 核心修复点

// ================= 注册 =================
async function register(){

  const user = u.value.trim();
  const pass = p.value.trim();

  if(!user || !pass){
    msg.innerText = "不能为空";
    return;
  }

  try{

    const res = await fetch(API + "/register", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({user,pass})
    });

    const d = await res.json();

    msg.innerText = d.ok ? "注册成功" : (d.msg || "失败");

  }catch(e){
    msg.innerText = "网络错误";
  }
}


// ================= 登录 =================
async function login(){

  const user = u.value.trim();
  const pass = p.value.trim();

  if(!user || !pass){
    msg.innerText = "不能为空";
    return;
  }

  try{

    const res = await fetch(API + "/login", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({user,pass})
    });

    const d = await res.json();

    if(!d.ok){
      msg.innerText = "登录失败";
      return;
    }

    localStorage.setItem("token", d.token);
    localStorage.setItem("user", d.user);

    location.href = (d.user === "admin") ? "/admin" : "/user";

  }catch(e){
    msg.innerText = "网络错误";
  }
}


// ================= 自动登录 =================
window.onload = async () => {

  const token = localStorage.getItem("token");
  const user = localStorage.getItem("user");

  if(!token || !user) return;

  try{

    const res = await fetch(API + "/me", {
      headers:{Authorization:token}
    });

    const d = await res.json();

    if(!d.ok){
      localStorage.clear();
      return;
    }

    location.href = (user === "admin") ? "/admin" : "/user";

  }catch(e){
    localStorage.clear();
  }
};
</script>

</body>
</html>
