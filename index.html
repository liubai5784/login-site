<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>这是一个网站- 登录</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:#e2e8f0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.box{
  width:340px;
  background:rgba(17,24,39,0.9);
  padding:24px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h2{
  text-align:center;
  margin-bottom:16px;
}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #334155;
  background:#0b1220;
  color:#fff;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.primary{
  background:#3b82f6;
  color:white;
}

.secondary{
  background:#334155;
  color:#e2e8f0;
}

#msg{
  text-align:center;
  font-size:13px;
  margin-top:10px;
  color:#93c5fd;
}
</style>
</head>

<body>

<div class="box">

  <h2>留白系统</h2>

  <input id="u" placeholder="用户名">
  <input id="p" type="password" placeholder="密码">

  <button class="primary" onclick="login()">登录</button>
  <button class="secondary" onclick="register()">注册</button>

  <div id="msg"></div>

</div>

<script>
const API = "/";


// ================= 注册 =================
async function register(){

  const user = u.value.trim();
  const pass = p.value.trim();

  if(!user || !pass){
    msg.innerText = "不能为空";
    return;
  }

  const res = await fetch(API+"register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({user,pass})
  });

  const d = await res.json();

  msg.innerText = d.ok ? "注册成功" : (d.msg || "失败");
}


// ================= 登录 =================
async function login(){

  const user = u.value.trim();
  const pass = p.value.trim();

  const res = await fetch(API+"login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({user,pass})
  });

  const d = await res.json();

  if(!d.ok){
    msg.innerText = "登录失败";
    return;
  }

  localStorage.setItem("token", d.token);
  localStorage.setItem("user", d.user);

  // 分流
  if(d.user === "admin"){
    location.href = "/admin";
  }else{
    location.href = "/user";
  }
}


// ================= 自动登录 =================
window.onload = async () => {

  const token = localStorage.getItem("token");
  const user = localStorage.getItem("user");

  if(!token || !user) return;

  const res = await fetch(API+"me",{
    headers:{Authorization:token}
  });

  const d = await res.json();

  if(!d.ok){
    localStorage.clear();
    return;
  }

  if(user === "admin"){
    location.href = "/admin";
  }else{
    location.href = "/user";
  }
};

</script>

</body>
</html>
