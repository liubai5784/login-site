<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>留白系统 V2</title>

<style>
body{
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
  background: radial-gradient(circle at top, #1e293b, #0f172a);
  color:#e2e8f0;
}

/* ============ 登录卡片 ============ */
#authBox{
  width:340px;
  margin:90px auto;
  background:rgba(17,24,39,0.9);
  padding:24px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  backdrop-filter: blur(8px);
}

h2,h3{
  margin:8px 0 16px;
  text-align:center;
}

input,textarea{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #334155;
  background:#0b1220;
  color:#fff;
  outline:none;
}

textarea{
  resize:none;
  min-height:70px;
}

button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.primary{
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  color:white;
}

.secondary{
  background:#334155;
  color:#e2e8f0;
}

.danger{
  background:#ef4444;
  color:white;
}

/* ============ 用户主页 ============ */
#userPage{
  max-width:520px;
  margin:50px auto;
  text-align:center;
  padding:20px;
}

.card{
  background:rgba(17,24,39,0.8);
  padding:20px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.avatar{
  width:96px;
  height:96px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #3b82f6;
  margin-top:10px;
}

.section-title{
  margin-top:20px;
  font-size:14px;
  opacity:0.8;
}

button:hover{
  opacity:0.9;
}

/* 小提示 */
#msg{
  font-size:13px;
  color:#93c5fd;
  text-align:center;
  margin-top:8px;
}

</style>
</head>

<body>

<!-- ============ 登录区 ============ -->
<div id="authBox">

  <h2>留白系统</h2>
  <p style="text-align:center;font-size:12px;opacity:0.6;">
    登录你的账号继续使用
  </p>

  <input id="username" placeholder="用户名">
  <input id="password" type="password" placeholder="密码">

  <button class="primary" onclick="login()">登录</button>
  <button class="secondary" onclick="register()">注册</button>

  <div id="msg"></div>
</div>

<!-- ============ 用户主页 ============ -->
<div id="userPage" class="hidden">

  <div class="card">

    <h2 id="name">用户</h2>

    <img id="avatar" class="avatar">

    <div class="section-title">上传头像</div>
    <input type="file" id="avatarFile">
    <button class="primary" onclick="uploadAvatar()">上传头像</button>

    <div class="section-title">个人简介</div>
    <textarea id="bio" placeholder="介绍一下自己..."></textarea>
    <button class="secondary" onclick="saveBio()">保存简介</button>

    <div class="section-title">想对作者说的话</div>
    <textarea id="msgToAuthor" placeholder="写点什么吧..."></textarea>
    <button class="secondary" onclick="saveMsg()">提交留言</button>

    <button class="danger" onclick="logout()">退出登录</button>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
