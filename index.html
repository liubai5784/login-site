<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录系统 Pro</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#4f8cff,#6a5af9);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  width:320px;
  background:#fff;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  text-align:center;
}

h2{
  margin-bottom:20px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:8px;
  outline:none;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
}

#loginBtn{
  background:#4f8cff;
  color:white;
}

#registerBtn{
  background:#6a5af9;
  color:white;
}

button:hover{
  opacity:0.9;
}

#msg{
  margin-top:10px;
  font-size:14px;
  color:#333;
}

</style>
</head>

<body>

<div class="card">
  <h2>账号系统</h2>

  <input id="user" placeholder="用户名">
  <input id="pass" type="password" placeholder="密码">

  <button id="loginBtn">登录</button>
  <button id="registerBtn">注册</button>

  <div id="msg"></div>
</div>

<script>
const API = "https://ceshi03.2750018830.workers.dev";

// 绑定按钮
const msg = document.getElementById("msg");

document.getElementById("loginBtn").onclick = login;
document.getElementById("registerBtn").onclick = register;

async function register(){

  const u = document.getElementById("user").value.trim();
  const p = document.getElementById("pass").value.trim();

  if(!u || !p){
    msg.innerText = "用户名或密码不能为空";
    return;
  }

  try{
    const res = await fetch(API + "/register", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({user:u,pass:p})
    });

    const data = await res.json();

    if(data.ok){
      msg.innerText = "注册成功 ✅";
    }else{
      msg.innerText = data.msg || "注册失败";
    }

  }catch(e){
    msg.innerText = "网络错误";
  }
}

async function login(){

  const u = document.getElementById("user").value.trim();
  const p = document.getElementById("pass").value.trim();

  if(!u || !p){
    msg.innerText = "请输入用户名和密码";
    return;
  }

  try{
    const res = await fetch(API + "/login", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({user:u,pass:p})
    });

    const data = await res.json();

    if(data.ok){
      localStorage.setItem("token",data.token);
      localStorage.setItem("user",data.user);

      msg.innerText = "登录成功 🎉";

      setTimeout(()=>{
        document.body.innerHTML = `<h1 style='color:white'>欢迎回来：${data.user}</h1>`;
      },800);

    }else{
      msg.innerText = "登录失败 ❌";
    }

  }catch(e){
    msg.innerText = "网络错误";
  }
}

// 自动登录
window.onload = async ()=>{
  const token = localStorage.getItem("token");
  if(!token) return;

  const res = await fetch(API+"/me",{
    headers:{"Authorization":token}
  });

  const data = await res.json();

  if(data.ok){
    document.body.innerHTML = `<h1 style='color:white'>欢迎回来：${data.user}</h1>`;
  }
};

</script>

</body>
</html>
